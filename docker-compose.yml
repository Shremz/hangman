version: '3.8'

services:
  backend:
    build: ./backend
    container_name: docker-compose-hangman-backend-container
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./frontend
    container_name: docker-compose-hangman-frontend-container
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
